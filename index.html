<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RADYO STREAM | Canlı Yayın</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #eef4ff;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .stream-container {
            max-width: 550px;
            width: 100%;
            background: rgba(18, 25, 40, 0.95);
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .radio-header {
            background: linear-gradient(135deg, #111927, #0d1220);
            padding: 1.2rem 1.5rem;
            text-align: center;
        }
        .radio-header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffffff, #7aa2f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .radio-header p {
            font-size: 0.7rem;
            color: #8e9bbe;
        }
        .player-area {
            background: rgba(15, 20, 34, 0.8);
            padding: 1.5rem 1rem;
            text-align: center;
        }
        .live-blink {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4d4d, #ff1a1a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: blinkLive 1s infinite;
            margin-bottom: 1rem;
        }
        @keyframes blinkLive {
            0% { opacity: 1; }
            50% { opacity: 0.55; }
            100% { opacity: 1; }
        }
        .listen2myradio-embed {
            background: #0a0e1a;
            border-radius: 20px;
            padding: 10px;
            margin: 10px 0;
        }
        iframe {
            width: 100%;
            border: none;
            border-radius: 16px;
        }
        .status-text {
            font-size: 0.7rem;
            color: #8da3d0;
            margin-top: 10px;
        }
        .news-section {
            background: rgba(11, 16, 32, 0.9);
            padding: 12px 16px;
        }
        .news-ticker {
            background: rgba(1, 1, 51, 0.4);
            border-radius: 20px;
            padding: 10px 14px;
            font-size: 0.8rem;
            border-left: 3px solid #ffb347;
        }
        .chat-section {
            background: rgba(15, 22, 37, 0.9);
            padding: 1rem;
        }
        .chat-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #b9fbc0;
        }
        .chat-messages {
            background: rgba(6, 10, 20, 0.8);
            border-radius: 24px;
            height: 260px;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 12px;
        }
        .message-bubble {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 22px;
            font-size: 0.85rem;
            background: #1e2a3e;
            color: #f0f3ff;
            margin-bottom: 8px;
        }
        .message-bubble.own {
            background: #2b5f8a;
            margin-left: auto;
        }
        .message-meta {
            font-size: 0.6rem;
            color: #a2b5e0;
            margin-bottom: 4px;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            background: rgba(12, 17, 34, 0.9);
            padding: 6px 10px;
            border-radius: 60px;
        }
        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            color: white;
            outline: none;
        }
        .send-btn {
            background: #25D366;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            cursor: pointer;
        }
        .contact-section {
            background: rgba(11, 16, 32, 0.9);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(22, 31, 51, 0.8);
            padding: 6px 18px;
            border-radius: 40px;
            text-decoration: none;
            color: #e2eaff;
            font-size: 0.8rem;
        }
        .footer-copyright {
            font-size: 0.65rem;
            text-align: center;
            padding: 14px;
            color: #6c7ea0;
            background: rgba(7, 12, 24, 0.9);
        }
        @media (max-width: 500px) {
            .chat-messages { height: 220px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="stream-container">
    <div class="radio-header">
        <h1>RADYO STREAM</h1>
        <p>✦ canlı yayın ✦</p>
    </div>

    <div class="player-area">
        <div class="live-blink">🔴 CANLI YAYIN</div>
        
        <!-- Listen2myradio EMBED PLAYER (kesin çalışır) -->
        <div class="listen2myradio-embed">
            <iframe src="https://listen2myradio.com/embed.php?username=uk4freenew&ampport=20895" 
                    height="120" 
                    scrolling="no" 
                    allow="autoplay">
            </iframe>
        </div>
        
        <div class="status-text" id="playerStatus">🎵 Yayın aktif • Dinlemek için Play butonuna basın</div>
    </div>

    <div class="news-section">
        <div class="news-ticker" id="newsTicker">
            🌟 RADYO STREAM 7/24 kesintisiz müzik yayını • Canlı sohbete katılın!
        </div>
    </div>

    <div class="chat-section">
        <div class="chat-title">
            <i class="fab fa-whatsapp"></i> <span>CANLI SOHBET</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message-bubble">
                <div class="message-meta"><span>🎵 Radyo Bot</span><span>şimdi</span></div>
                RADYO STREAM'e hoş geldiniz! 🎵
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesaj yaz" autocomplete="off">
            <button class="send-btn" id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="contact-section">
        <a href="https://wa.me/901234567890" target="_blank" class="contact-item">
            <i class="fab fa-whatsapp" style="color:#25D366;"></i> WhatsApp
        </a>
        <a href="mailto:radyostream@example.com" class="contact-item">
            <i class="fas fa-envelope"></i> E-posta
        </a>
    </div>
    
    <div class="footer-copyright">
        © 2025 <span>RADYO STREAM</span> — tüm hakları saklıdır
    </div>
</div>

<script>
    (function(){
        // ============= CHAT =============
        const chatMessagesDiv = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendMsgBtn');
        
        let username = "Dinleyici_" + Math.floor(Math.random() * 900 + 100);
        let messageHistory = [];
        
        function loadMessages() {
            const stored = localStorage.getItem('radioChat');
            if (stored) {
                try {
                    messageHistory = JSON.parse(stored);
                    renderMessages();
                } catch(e) {}
            }
        }
        
        function saveMessages() {
            localStorage.setItem('radioChat', JSON.stringify(messageHistory.slice(-50)));
        }
        
        function renderMessages() {
            chatMessagesDiv.innerHTML = '';
            messageHistory.forEach(msg => {
                const isOwn = msg.username === username;
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = "message-bubble" + (isOwn ? " own" : "");
                bubbleDiv.innerHTML = `
                    <div class="message-meta"><span>${escapeHtml(msg.username)}</span><span>${msg.time}</span></div>
                    <div>${escapeHtml(msg.text)}</div>
                `;
                chatMessagesDiv.appendChild(bubbleDiv);
            });
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function addMessage(text) {
            if (!text.trim()) return;
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            messageHistory.push({
                username: username,
                text: text.trim().substring(0, 200),
                time: timeStr
            });
            saveMessages();
            renderMessages();
        }
        
        function sendMessage() {
            const text = chatInput.value;
            if (!text.trim()) return;
            addMessage(text);
            chatInput.value = '';
        }
        
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        loadMessages();
        setTimeout(() => {
            addMessage("Sohbete katıldım! 🎵");
        }, 1000);
        
        // Haber döngüsü
        const newsItems = [
            "🎵 RADYO STREAM 7/24 kesintisiz yayında",
            "🎧 Shoutcast teknolojisi ile kristal netliğinde ses",
            "💬 Canlı sohbete katılın!",
            "📻 128 kbps kalitesinde kesintisiz müzik"
        ];
        let newsIdx = 0;
        setInterval(() => {
            newsIdx = (newsIdx + 1) % newsItems.length;
            document.getElementById('newsTicker').innerHTML = "📌 " + newsItems[newsIdx];
        }, 10000);
    })();
</script>
</body>
</html>
